name: build
env:
  ACTIONS_RUNNER_DEBUG: true
  ACTIONS_STEP_DEBUG: true
  # 禁用任何可能的缓存
  NO_CACHE: true
  # 强制使用 Node.js 24 运行 actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  push:
    branches:
      - self
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[ci skip]') }}
    env:
      CI: true
    steps:
      - name: 清理工作空间
        run: |
          rm -rf $GITHUB_WORKSPACE/*
          rm -rf $GITHUB_WORKSPACE/.[!.]*
          
      - uses: actions/checkout@v6.0.2
      - name: ShellCheck
        run: bash ./check

  macos-test:
    name: macOS 测试
    runs-on: macos-latest
    env:
      CI: true
    steps:
      - name: 完全清理环境
        run: |
          # 清理工作目录
          sudo rm -rf $GITHUB_WORKSPACE/* $GITHUB_WORKSPACE/.[!.]* || true
          
          # 清理临时文件
          sudo rm -rf /tmp/* || true
          
          # 对于macOS runner，清理Homebrew缓存
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            brew cleanup --prune=all || true
            rm -rf ~/Library/Caches/Homebrew/* || true
          fi
          
          # 清理用户目录下可能的配置文件
          rm -rf ~/.config/fish ~/.gitconfig ~/.tmux.conf || true

      - uses: actions/checkout@v6.0.2
        with:
          submodules: recursive
      
      - name: 安装基础依赖
        run: |
          brew update
          brew install rcm
      
      - name: 运行 bootstrap
        run: bash ./bootstrap
      
      - name: 运行测试
        run: bash ./test
      
      - name: 验证配置文件
        run: |
          test -f ~/.config/fish/config.fish
          test -f ~/.gitconfig
          test -f ~/.tmux.conf
      
      - name: 验证应用配置
        run: |
          fish -ic "which nvim"
          fish -ic "which git"
      
      - name: 生成报告
        if: always()
        run: |
          # 禁用 set -e，避免测试脚本失败导致整个报告生成中断
          set +e

          echo "## 测试结果 - macOS $(sw_vers -productVersion)" > $GITHUB_STEP_SUMMARY
          echo "- 操作系统: $(sw_vers -productName) $(sw_vers -productVersion)" >> $GITHUB_STEP_SUMMARY
          echo "- Homebrew: $(brew --version 2>/dev/null | head -n 1)" >> $GITHUB_STEP_SUMMARY
          echo "- 已安装包数量: $(brew list 2>/dev/null | wc -l | xargs)" >> $GITHUB_STEP_SUMMARY

          # 添加详细测试结果
          echo "### 应用测试结果" >> $GITHUB_STEP_SUMMARY

          # 定义需要测试的应用列表 (与 bootstrap 安装分组一致)
          # group1: fish git ssh gpg starship
          # group2: go rust ruby java node
          # group3: vim nvim tmux fzf (VSCode 无 init 且 CI 跳过测试)
          for app in bash fish git ssh gpg starship go rust ruby java node vim nvim tmux fzf MavenDaemon sdkman; do
            if [ -f "./app/$app/test" ]; then
              # 捕获测试脚本输出，用于判断是否跳过
              # 使用 || true 确保即使测试脚本失败也不会中断循环
              test_output=$(bash "./app/$app/test" 2>&1 || true)
              test_exit_code=$?

              # 检查是否是 CI 环境下跳过测试
              if echo "$test_output" | grep -q "CI 环境"; then
                echo "- $app: ⏭️ (CI 跳过)" >> $GITHUB_STEP_SUMMARY
              elif [ $test_exit_code -eq 0 ]; then
                echo "- $app: ✅" >> $GITHUB_STEP_SUMMARY
              else
                echo "- $app: ❌" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "- $app: ⚠️ (无测试)" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # 检查 dotfiles 安装标记文件来判断状态
          INSTALLED_COUNT=$(ls ~/.dotfiles_configured_* 2>/dev/null | wc -l | xargs)
          if [ "$INSTALLED_COUNT" -ge 15 ]; then
            echo "- dotfiles 状态: ✅ 成功 ($INSTALLED_COUNT 个应用已配置)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- dotfiles 状态: ⚠️ 部分成功 ($INSTALLED_COUNT 个应用已配置)" >> $GITHUB_STEP_SUMMARY
          fi
