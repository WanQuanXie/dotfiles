# ============================================
# Tmux 配置文件
# ============================================
# 基于 https://github.com/gpakosz/.tmux 模板
# 针对 macOS 15+ / Apple Silicon / tmux 3.6+ 优化

# -- 终端与基础设置 ------------------------------------------------------------

set -g default-terminal "tmux-256color"           # 使用 tmux 专用终端类型
set -sa terminal-features ",*:RGB"                # 启用真彩色支持 (tmux 3.1+)
set -s set-clipboard on                           # 启用 OSC 52 剪贴板集成

set -sg repeat-time 600                           # 重复命令的超时时间（毫秒）
set -s focus-events on                            # 启用焦点事件传递给应用
set -g mouse on                                   # 启用鼠标支持
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

set -g history-limit 10000                        # 回滚缓冲区行数

# -- 配置管理 ------------------------------------------------------------------

# 使用编辑器打开配置文件并重新加载
bind e new-window -n '~/.tmux.conf' "sh -c '\${EDITOR:-vim} ~/.tmux.conf && tmux source ~/.tmux.conf && tmux display \"~/.tmux.conf sourced\"'"

# 向所有面板发送命令（调试用）
bind E command-prompt -p "Command:" \
    "run \"tmux list-panes -a -F '##{session_name}:##{window_index}.##{pane_index}' \
    | xargs -I PANE tmux send-keys -t PANE '%1' Enter\""

# 重新加载配置文件
bind r source-file ~/.tmux.conf \; display '~/.tmux.conf sourced'


# -- 显示设置 ------------------------------------------------------------------

set -g base-index 1                               # 窗口编号从 1 开始
setw -g pane-base-index 1                         # 面板编号从 1 开始

setw -g automatic-rename on                       # 根据当前程序自动重命名窗口
set -g renumber-windows on                        # 关闭窗口后自动重新编号

set -g set-titles on                              # 设置终端标题

set -g display-panes-time 800                     # 面板指示器显示时长（毫秒）
set -g display-time 1000                          # 状态消息显示时长（毫秒）

set -g status-interval 10                         # 状态栏刷新间隔（秒）

# 清空屏幕和历史记录
bind -n C-l send-keys C-l \; run 'sleep 0.1' \; clear-history

# 监控窗口活动但不显示通知
set -g monitor-activity on
set -g visual-activity off


# -- 导航与窗口管理 ------------------------------------------------------------

# 查找会话
bind C-f command-prompt -p find-session 'switch-client -t %%'

# 弹出窗口选择会话（需要 fzf）
bind C-j display-popup -E "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"

# 分割当前窗口为上下面板（继承当前路径）
bind - split-window -v -c "#{pane_current_path}"

# 分割当前窗口为左右面板（继承当前路径）
bind _ split-window -h -c "#{pane_current_path}"

# 面板导航（vim 风格）
bind -r h select-pane -L                          # 选择左侧面板
bind -r j select-pane -D                          # 选择下方面板
bind -r k select-pane -U                          # 选择上方面板
bind -r l select-pane -R                          # 选择右侧面板
bind > swap-pane -D                               # 与下一个面板交换位置
bind < swap-pane -U                               # 与上一个面板交换位置

# 最大化/还原当前面板
bind + resize-pane -Z

# 调整面板大小
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# 窗口导航
unbind n
unbind p
bind -r [ previous-window                         # 选择上一个窗口
bind -r ] next-window                             # 选择下一个窗口
bind Tab last-window                              # 切换到最后使用的窗口

# 切换鼠标模式
bind m set -g mouse \; display "Mouse: #{?mouse,ON,OFF}"


# -- 复制模式 ------------------------------------------------------------------

bind Enter copy-mode                              # 进入复制模式

# 复制模式按键绑定（vim 风格）
bind -T copy-mode-vi v send -X begin-selection    # 开始选择
bind -T copy-mode-vi C-v send -X rectangle-toggle # 切换矩形选择
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"  # 复制到系统剪贴板
bind -T copy-mode-vi Escape send -X cancel        # 退出复制模式
bind -T copy-mode-vi H send -X start-of-line      # 跳转到行首
bind -T copy-mode-vi L send -X end-of-line        # 跳转到行尾


# -- 缓冲区管理 ----------------------------------------------------------------

bind b list-buffers                               # 列出粘贴缓冲区
bind p paste-buffer                               # 粘贴顶部缓冲区内容
bind P choose-buffer                              # 选择要粘贴的缓冲区


# -- 插件配置 ------------------------------------------------------------------

set -g @plugin "arcticicestudio/nord-tmux"        # Nord 主题
set -g @plugin 'tmux-plugins/tmux-resurrect'      # 会话恢复

# Nord 主题：禁用图标字体（使用标准字符）
set -g @nord_tmux_no_patched_font "1"

# 运行 TPM 插件管理器
run '~/.tmux/plugins/tpm/tpm'
